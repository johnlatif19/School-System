<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول طالب - نظام المدرسة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #5a67d8; }
        .signup-link { text-align: center; margin-top: 20px; }
        a { color: #667eea; text-decoration: none; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔐 تسجيل دخول الطالب</h1>
        <input type="text" id="studentId" placeholder="الرقم القومي للطالب" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button onclick="loginStudent()">دخول</button>
        <div class="signup-link">ليس لديك حساب؟ <a href="/signin-student.html">إنشاء حساب جديد</a></div>
        <div id="message" class="message"></div>
    </div>
    <script>
        async function loginStudent() {
            const studentId = document.getElementById('studentId').value;
            const password = document.getElementById('password').value;
            const response = await fetch('/api/student/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ studentId, password })
            });
            const data = await response.json();
            if (data.success) {
                localStorage.setItem('studentToken', data.token);
                localStorage.setItem('studentData', JSON.stringify(data.student));
                window.location.href = '/student-dashboard.html';
            } else {
                document.getElementById('message').innerHTML = '❌ ' + data.error;
                document.getElementById('message').style.background = '#f4433620';
                document.getElementById('message').style.color = '#c62828';
            }
        }
    </script>
</body>
</html>
