<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب طالب - نظام المدرسة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .signup-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #5a67d8; }
        .login-link { text-align: center; margin-top: 20px; }
        a { color: #667eea; text-decoration: none; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h1>📝 إنشاء حساب طالب</h1>
        <input type="text" id="studentId" placeholder="الرقم التعريفي للطالب" required>
        <input type="text" id="name" placeholder="الاسم الكامل" required>
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <input type="text" id="className" placeholder="الصف الدراسي (مثال: 3ث/علمي)" required>
        <input type="email" id="parentEmail" placeholder="البريد الإلكتروني لولي الأمر" required>
        <button onclick="registerStudent()">إنشاء حساب</button>
        <div class="login-link">لديك حساب بالفعل؟ <a href="/login-student.html">تسجيل دخول</a></div>
        <div id="message" class="message"></div>
    </div>
    <script>
        async function registerStudent() {
            const data = {
                studentId: document.getElementById('studentId').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                className: document.getElementById('className').value,
                parentEmail: document.getElementById('parentEmail').value
            };
            const response = await fetch('/api/student/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            const msgDiv = document.getElementById('message');
            if (result.success) {
                msgDiv.style.background = '#4CAF5020';
                msgDiv.style.color = '#2E7D32';
                msgDiv.innerHTML = '✅ ' + result.message + ' - سيتم تحويلك لتسجيل الدخول';
                setTimeout(() => window.location.href = '/login-student.html', 2000);
            } else {
                msgDiv.style.background = '#f4433620';
                msgDiv.style.color = '#c62828';
                msgDiv.innerHTML = '❌ ' + result.error;
            }
        }
    </script>
</body>
</html>
